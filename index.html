<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Element Position Interaction Test</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f7fa;
}

#container{
display:flex;
gap:60px;
align-items:flex-start;
}

#home{
width:420px;
height:260px;
border:3px solid #1976d2;
background:#e3f2fd;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
position:relative;
cursor:pointer;
user-select:none;
}

#dragItem{
width:90px;
height:40px;
background:#ffcc80;
border:2px solid #ef6c00;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
margin-bottom:20px;
}

.marker{
position:absolute;
width:14px;
height:14px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
}

#resultBox{
margin-top:30px;
background:white;
border:1px solid #ccc;
padding:15px;
width:420px;
}

.resultLine{
margin-top:8px;
}

</style>
</head>

<body>

<h1>Element Position Interaction Test</h1>

<div id="container">

<div>

<div id="home">
Home
</div>

<div id="resultBox">

<div class="resultLine">
<b id="clickZone">CLICK ZONE: NONE</b>
</div>

<div class="resultLine">
<b id="dropZone">DROP ZONE: NONE</b>
</div>

<div id="coords"></div>

</div>

</div>

<div>

<div id="dragItem" draggable="true">
abc
</div>

<p>Drag this element onto <b>Home</b></p>

</div>

</div>

<script>

const element=document.getElementById("home")
const clickZone=document.getElementById("clickZone")
const dropZone=document.getElementById("dropZone")
const coords=document.getElementById("coords")

// -------------------------
// ZONE DETECTION
// -------------------------

function detectZone(x,y,w,h){

const corner=12
const edge=8

// corners (evaluados primero)

if(x <= corner && y <= corner)
return "TOP LEFT CORNER"

if(x >= w-corner && y <= corner)
return "TOP RIGHT CORNER"

if(x <= corner && y >= h-corner)
return "BOTTOM LEFT CORNER"

if(x >= w-corner && y >= h-corner)
return "BOTTOM RIGHT CORNER"


// edges

if(y <= edge)
return "TOP EDGE"

if(y >= h-edge)
return "BOTTOM EDGE"

if(x <= edge)
return "LEFT EDGE"

if(x >= w-edge)
return "RIGHT EDGE"


// sides

if(x < w/2)
return "LEFT SIDE"

if(x >= w/2)
return "RIGHT SIDE"

}

// -------------------------
// MARKER
// -------------------------

function drawMarker(x,y){

const old=document.querySelector(".marker")
if(old) old.remove()

const marker=document.createElement("div")

marker.className="marker"

marker.style.left=x+"px"
marker.style.top=y+"px"

element.appendChild(marker)

}

// -------------------------
// CLICK TEST
// -------------------------

element.addEventListener("click",(e)=>{

const rect=element.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const zone=detectZone(x,y,rect.width,rect.height)

clickZone.textContent="CLICK ZONE: "+zone

coords.textContent=`x:${Math.round(x)} y:${Math.round(y)}`

drawMarker(x,y)

})


// -------------------------
// DRAG START
// -------------------------

const dragItem=document.getElementById("dragItem")

dragItem.addEventListener("dragstart",(e)=>{

e.dataTransfer.setData("text","abc")

})

// -------------------------
// DRAG OVER
// -------------------------

element.addEventListener("dragover",(e)=>{

e.preventDefault()

})

// -------------------------
// DROP TEST
// -------------------------

element.addEventListener("drop",(e)=>{

e.preventDefault()

const rect=element.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const zone=detectZone(x,y,rect.width,rect.height)

dropZone.textContent="DROP ZONE: "+zone

coords.textContent=`x:${Math.round(x)} y:${Math.round(y)}`

drawMarker(x,y)

})

</script>

</body>
</html>
